<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – Peace For You Network</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <div class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white rounded-lg shadow-xl max-w-md w-full p-8">
            <div class="text-center mb-8">
                <span class="text-4xl">🕊️</span>
                <h1 class="text-2xl font-bold mt-2">Peace For You Network</h1>
                <p class="text-gray-500">Sign in with magic link</p>
            </div>
            
            <div id="loginForm">
                <input type="email" id="email" placeholder="Your email address" class="w-full px-4 py-3 border rounded-lg mb-4">
                <button onclick="sendMagicLink()" class="w-full bg-blue-600 text-white py-3 rounded-lg hover:bg-blue-700">✨ Send Magic Link</button>
                <p class="text-xs text-gray-400 text-center mt-4">No password needed. We'll email you a secure link.</p>
            </div>
            
            <div id="successMessage" class="hidden text-center">
                <div class="text-5xl mb-4">✉️</div>
                <h2 class="text-xl font-bold mb-2">Check your email</h2>
                <p class="text-gray-600 mb-4">Magic link sent! Redirecting...</p>
            </div>
        </div>
    </div>

    <script>
        function sendMagicLink() {
            const email = document.getElementById('email').value;
            if (!email || !email.includes('@')) {
                alert('Please enter a valid email');
                return;
            }
            
            localStorage.setItem('currentUser', email);
            
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('successMessage').classList.remove('hidden');
